<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/notification.css">
    <title>Signup</title>
    
</head>
<body>
    <section class="notifications-container"></section>

    <form class="rounded-xl max-w-md mx-auto mt-10 bg-yellow-100 border-4 border-black p-8 shadow-[8px_8px_0px_#000] flex flex-col gap-4 font-mono">
        <H2 class="text-3xl font-bold text-center text-pink-600 tracking-widest">Regístrate</H2>

        <label for="name" class="font-bold text-black">Nombre:</label>
        <input type="text" id="name" name="name"  class="border-2 border-black bg-white px-3 py-2 focus:outline-none focus:bg-cyan-100" required>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email"  class="border-2 border-black bg-white px-3 py-2 focus:outline-none focus:bg-cyan-100" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password"  class="border-2 border-black bg-white px-3 py-2 focus:outline-none focus:bg-cyan-100" minlength="6" required>

        <label for="password-confirm">Confirma tu Contraseña:</label>
        <input type="password" id="password-confirm" name="password-confirm" class="border-2 border-black bg-white px-3 py-2 focus:outline-none focus:bg-cyan-100" minlength="6" required>

        <button type="submit" class="bg-pink-500 text-white font-bold py-3 border-2 border-black hover:bg-cyan-400 transition-all duration-200 shadow-[4px_4px_0px_#000]">Registrarse</button>
        <div class="notifications-container"></div>
    </form>

    <script type="module" src="signup.js"></script>
</body>
</html>
